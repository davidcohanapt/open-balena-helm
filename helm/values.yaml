postgrest:
  replicas: 1
  port: 8000
  corsAllowedOrigins: ""
  # When true, chart does not emit PGRST_DB_URI or OPENBALENA_DB_ROLE (provide via extraEnv from external secret)
  connectionConfigFromExternalSecret: true
  # When connectionConfigFromExternalSecret is true, PGRST_DB_ANON_ROLE is read from this secret's OPENBALENA_DB_ROLE key so they match
  connectionConfigSecretName: "openbalena-config"
  labels: {}
  annotations: {}
  affinity: {}
  resources: {}
  nodeSelector:
  tolerations:
  extraEnv: []
  extraEnvFrom: []
  service:
    labels: {}
    annotations: {}
    externalIPs: []
  sentry-dsn: ""
  image:
    repository: harmonidcaputo/open-balena-postgrest
    tag: latest
    pullPolicy: Always

