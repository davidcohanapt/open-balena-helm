global:
  hostname: ""
  email: "admin@openbalena.io"
  password: "password"
  production-mode: true
  ssh-authorized-keys: ""

  loki:
    server:
    port: 9095
    writePct: 100

  promtail:
    server:
    port: 1514

  db:
    server:
    port: 5432
    ssl: 
      enabled: false
      rejectUnauthorized: true
    user: "docker"
    password: "password"
    name: "resin"
    role: "docker"
    replica:
      enabled: false
      server:
      port: 5432

  s3:
    server:
    registryBucket: "registry-data"
    registryStoragePath: "/data"
    imageBucket: "image-data"
    imageStoragePrefix: "images"
    region: "us-east-1"
    accesskey: ""
    secretkey: ""

    cloudfront:
      endpoint:
      keypair:
      privatekey:
  
  redis:
    server:
    port: 6379
    clusterMode: false

  keys:
    cookie-secret:
    jwt-secret:
    service-api-key:
    api-vpn-service-api-key:
    registry-secret-key:
    token-auth-builder-token:
    vpn-dhparams:

  tolerations:

secrets:
  create: true

# externalSecrets: 1:1 with chart secrets. Set secrets.create=false and enable the ones you want from AWS Secrets Manager.
# secretStoreName: name of your ClusterSecretStore (not created by this chart). Set to match the store you installed for AWS.
# Each key under "secrets" is the exact Secret name from secrets.yaml. remoteRef: key (required), property (optional).
externalSecrets:
  enabled: false
  region: "us-west-2"
  secretStoreName: ""  # e.g. "global-external-secrets-aws-us-west-2" or your ClusterSecretStore name
  secrets: {}
  # Example: pull same secrets as chart would create, from Secrets Manager. Set secrets.create=false when using these.
  # secrets:
  #   openbalena-db-creds:
  #     refreshInterval: 15m
  #     data:
  #       username: { key: "openbalena/db", property: "username" }
  #       password: { key: "openbalena/db", property: "password" }
  #   openbalena-api-jwt-auth:
  #     data:
  #       secret: { key: "openbalena/api-jwt-secret" }
  #   openbalena-api-creds:
  #     data:
  #       email: { key: "openbalena/api-creds", property: "email" }
  #       password: { key: "openbalena/api-creds", property: "password" }
  #   openbalena-s3-keys:
  #     data:
  #       access-key: { key: "openbalena/s3", property: "access-key" }
  #       secret-key: { key: "openbalena/s3", property: "secret-key" }
  #   openbalena-api-cookie-session:    # keys: secret
  #   openbalena-api-github-auth:      # keys: token
  #   openbalena-api-keys:             # keys: vpn
  #   openbalena-ssh:                 # keys: authorized-keys
  #   openbalena-vpn-api-keys:         # keys: api
  #   openbalena-registry-api-keys:   # keys: builder
  #   openbalena-registry-http:       # keys: secret
  #   openbalena-remote-cookie:       # keys: secret
  #   openbalena-pki-root:            # keys: ca_chain, issuing_ca, certificate, private_key
  #   openbalena-pki-api:             # keys: certificate, private_key
  #   openbalena-pki-vpn:             # keys: ca_chain, issuing_ca, certificate, private_key
  #   openbalena-vpn-dhparams:        # keys: dhparams
  # Extra ExternalSecrets (any name). Optional "components" limits creation to when that component is enabled.
  extra: []
  #   - name: my-app-creds
  #     data:
  #       token: { key: "myapp/token" }
  #     # components: [api]   # optional: only create when api enabled; omit to always create

issuers:
  acme:
    enabled: true
    name: openbalena-certificate-issuer
    server: "https://acme-v02.api.letsencrypt.org/directory"
    email: "validemail@yourdomain.com"
    nodeSelector:
    tolerations:
ingress:
  ingressClassName: openbalena-haproxy
  annotations: {}
  alb:
    scheme: internet-facing
    inboundCidrs: "0.0.0.0/0"
    securityGroupIds: ""
    certificateArn: ""
    listenPorts: '[{"HTTP": 80}, {"HTTPS": 443}]'
    sslRedirect: "443"
  http:
    annotations: {}
  tunnel:
    annotations: {}
  vpn:
    annotations: {}

api:
  enabled: true
  replicas: 1
  image:
    repository: balena/open-balena-api
    tag: "v35.0.5"
    pullPolicy: IfNotPresent

  labels: {}
  annotations: {}
  affinity: {}
  resources: {}
  nodeSelector:
  tolerations:
  extraEnv: []
  extraEnvFrom: []

  service:
    labels: {}
    annotations: {}
    externalIPs: []

  sentry-dsn: ""

  contractsPrivateRepoOwner:
  contractsPrivateRepoName:
  contractsPrivateRepoBranch:
  contractsPrivateRepoToken:

vpn:
  enabled: true
  replicas: 1
  image:
    repository: balena/open-balena-vpn
