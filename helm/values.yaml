    labels: {}
    annotations: {}
    affinity: {}
    resources: {}
    nodeSelector:
    tolerations:
    extraEnv: []
    extraEnvFrom: []

    service:
      labels: {}
      annotations: {}
      externalIPs: []
    
    persistence:
      enabled: false
      # storage: "100Gi"
