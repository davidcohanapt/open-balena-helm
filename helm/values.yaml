    pullPolicy: IfNotPresent

  labels: {}
  annotations: {}
  affinity: {}
  resources: {}
  nodeSelector:
  tolerations:
  extraEnv: []
  extraEnvFrom: []

  service:
    labels: {}
    annotations: {}
    externalIPs: []

  sentry-dsn: ""
  instanceCount: 1

registry:
  enabled: true
  replicas: 1
  image:
    repository: balena/open-balena-registry
    tag: "v2.41.27"
    pullPolicy: IfNotPresent

  disableRedirect: false
  disableUploadPurging: true

  labels: {}
  annotations: {}
  affinity: {}
  resources: {}
  nodeSelector:
  tolerations:
  extraEnv: []
  extraEnvFrom: []

  service:
    labels: {}
    annotations: {}
    externalIPs: []

s3:
  enabled: true
  replicas: 1
  image:
    repository: balena/open-balena-s3
    tag: "v2.28.68"
    pullPolicy: IfNotPresent

  labels: {}
  annotations: {}
  affinity: {}
  resources: {}
  nodeSelector:
  tolerations:
  extraEnv: []
  extraEnvFrom: []

  service:
    labels: {}
    annotations: {}
    externalIPs: []

  storage: "25Gi"
  storageClass:

  autoCreateBuckets: "registry-data;image-data;loki"

db:
  enabled: true
  replicas: 1
  image:
    repository: balena/open-balena-db
    tag: "v6.0.0"
    pullPolicy: IfNotPresent

  labels: {}
  annotations: {}
  affinity: {}
  resources: {}
  nodeSelector:
  tolerations:
  extraEnv: []
  extraEnvFrom: []

  service:
    labels: {}
    annotations: {}
    externalIPs: []

  storage: "10Gi"
  storageClass:

  ## Start PostgreSQL pod without limitations on shm memory.
  ## By default docker and containerd limit `/dev/shm` to `64M`
  ## ref: https://github.com/docker-library/postgres/issues/416
  ## ref: https://github.com/containerd/containerd/issues/3654
  ##
  shmVolume:
    ## @param db.shmVolume.enabled Enable emptyDir volume for /dev/shm for PostgreSQL pod(s)
    ##
    enabled: true
    ## @param db.shmVolume.sizeLimit Set this to enable a size limit on the shm tmpfs
    ## Note: the size of the tmpfs counts against container's memory limit
    ## e.g:
    ## sizeLimit: 1Gi
    ##
    sizeLimit: ""

redis:
  enabled: true
  replicas: 1
  image:
    repository: redis
    tag: "alpine"
