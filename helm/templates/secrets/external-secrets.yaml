{{- $ext := index .Values "externalSecrets" | default dict }}
{{- if index $ext "enabled" }}
{{- $root := . }}
{{- $region := index $ext "region" | default "us-west-2" }}
{{- $defaultStoreName := index $ext "secretStoreName" | default (printf "global-external-secrets-aws-%s" $region) }}
{{- $secretDefs := list
  (dict "name" "openbalena-api-creds" "components" (list "api"))
  (dict "name" "openbalena-api-cookie-session" "components" (list "api"))
  (dict "name" "openbalena-api-jwt-auth" "components" (list "api" "ui"))
  (dict "name" "openbalena-api-github-auth" "components" (list "api"))
  (dict "name" "openbalena-api-keys" "components" (list "api"))
  (dict "name" "openbalena-ssh" "components" (list "api"))
  (dict "name" "openbalena-vpn-api-keys" "components" (list "api" "vpn"))
  (dict "name" "openbalena-registry-api-keys" "components" (list "api" "registry"))
  (dict "name" "openbalena-s3-keys" "components" (list "s3" "api" "registry" "ui"))
  (dict "name" "openbalena-db-creds" "components" (list "db" "api" "ui"))
  (dict "name" "openbalena-registry-http" "components" (list "registry"))
  (dict "name" "openbalena-remote-cookie" "components" (list "ui"))
  (dict "name" "openbalena-pki-root" "components" (list "api" "registry" "vpn"))
  (dict "name" "openbalena-pki-api" "components" (list "api" "registry" "vpn"))
  (dict "name" "openbalena-pki-vpn" "components" (list "api" "registry" "vpn"))
  (dict "name" "openbalena-vpn-dhparams" "components" (list "api" "registry" "vpn"))
}}
{{- $extSecrets := index $ext "secrets" | default dict }}
{{- range $secretDefs }}
{{- $config := index $extSecrets .name }}
{{- if and $config $config.data (include "externalSecret.shouldCreate" (list $root (dict "components" .components))) }}
---
# ExternalSecret for {{ .name }} (matches chart secret from secrets.yaml)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "openbalena.fullname" $root }}-{{ .name | replace "openbalena-" "" }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "openbalena.labels" $root | nindent 4 }}
    component: external-secret
    provider: aws-secrets-manager
spec:
  refreshInterval: {{ $config.refreshInterval | default "15m" }}
  secretStoreRef:
    name: {{ $config.secretStoreName | default $defaultStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .name }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      metadata:
        labels:
          {{- include "openbalena.labels" $root | nindent 10 }}
          component: external-secret
          managed-by: external-secrets
  data:
  {{- range $secretKey, $ref := $config.data }}
  - secretKey: {{ $secretKey }}
    remoteRef:
      key: {{ index $ref "key" | quote }}
      {{- if index $ref "property" }}
      property: {{ index $ref "property" | quote }}
      {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- range index $ext "extra" | default list }}
{{- $extra := . }}
{{- if and $extra.name $extra.data (or (not $extra.components) (eq (len $extra.components) 0) (include "externalSecret.shouldCreate" (list $root (dict "components" $extra.components)))) }}
---
# ExternalSecret (extra): {{ $extra.name }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "openbalena.fullname" $root }}-extra-{{ $extra.name }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "openbalena.labels" $root | nindent 4 }}
    component: external-secret
    provider: aws-secrets-manager
spec:
  refreshInterval: {{ $extra.refreshInterval | default "15m" }}
  secretStoreRef:
    name: {{ $extra.secretStoreName | default $defaultStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ $extra.name }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      metadata:
        labels:
          {{- include "openbalena.labels" $root | nindent 10 }}
          component: external-secret
          managed-by: external-secrets
  data:
  {{- range $secretKey, $ref := $extra.data }}
  - secretKey: {{ $secretKey }}
    remoteRef:
      key: {{ index $ref "key" | quote }}
      {{- if index $ref "property" }}
      property: {{ index $ref "property" | quote }}
      {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
